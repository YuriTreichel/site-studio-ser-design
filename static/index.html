<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Studio Ser Design | Home</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <style>
            body {
                background-color: #ffffff;
                color: #2b2c2c;
                overflow-x: hidden;
            }
            .hero-home {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                background-color: #efe0cb; /* Cor do menu offcanvas para consistência */
                position: relative;
            }
            .hero-home h1 {
                font-size: clamp(2.5rem, 10vw, 8rem);
                font-weight: 200;
                text-transform: uppercase;
                letter-spacing: 10px;
                margin-bottom: 20px;
            }
            .hero-home p {
                font-family: "Montserrat", sans-serif;
                font-size: 1.2rem;
                text-transform: uppercase;
                letter-spacing: 5px;
                font-weight: 300;
                opacity: 0.7;
            }
            .btn-work {
                margin-top: 40px;
                padding: 15px 40px;
                border: 1px solid #2b2c2c;
                color: #2b2c2c;
                text-decoration: none;
                text-transform: uppercase;
                letter-spacing: 3px;
                font-size: 0.8rem;
                transition: all 0.4s ease;
            }
            .btn-work:hover {
                background-color: #2b2c2c;
                color: #efe0cb;
            }
        </style>
    </head>
    <body>
        <header class="header">
            <nav
                class="d-flex justify-content-between align-items-center container-fluid p-5"
            >
                <div class="logo">
                    <a href="index.html">
                        <img src="img/logo.png" alt="Studio Ser Design" />
                    </a>
                </div>
                <div class="menu montserrat-400 text-uppercase">
                    <button
                        class="btn btn-link border-0 p-0 text-decoration-none d-flex align-items-center gap-2"
                        type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#mainMenuOffcanvas"
                        aria-controls="mainMenuOffcanvas"
                        style="color: inherit"
                    >
                        <span class="d-none d-md-inline" style="margin-top: 2px"
                            >Início</span
                        >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="34"
                            height="34"
                            fill="currentColor"
                            class="bi bi-list"
                            viewBox="0 0 16 16"
                        >
                            <path
                                fill-rule="evenodd"
                                d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"
                            />
                        </svg>
                    </button>
                </div>
            </nav>
        </header>
        <!-- Offcanvas Menu -->
        <div
            class="offcanvas offcanvas-end"
            tabindex="-1"
            id="mainMenuOffcanvas"
            aria-labelledby="mainMenuOffcanvasLabel"
            style="background-color: #efe0cb; color: #2b2c2c"
        >
            <div class="offcanvas-header p-5 pb-0">
                <h5
                    class="offcanvas-title montserrat-400"
                    id="mainMenuOffcanvasLabel"
                >
                    MENU
                </h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="offcanvas"
                    aria-label="Close"
                ></button>
            </div>
            <div class="offcanvas-body p-5">
                <ul
                    class="navbar-nav justify-content-end flex-grow-1 pe-3 fs-3 montserrat-300"
                >
                    <li class="nav-item mb-4 mt-4">
                        <a
                            class="nav-link text-uppercase hover-underline active"
                            href="index.html"
                            >Início</a
                        >
                    </li>
                    <li class="nav-item mb-4">
                        <a
                            class="nav-link text-uppercase hover-underline"
                            href="projects.html"
                            >Projetos</a
                        >
                    </li>
                    <li class="nav-item mb-4">
                        <a
                            class="nav-link text-uppercase hover-underline"
                            href="#"
                            >Sobre</a
                        >
                    </li>
                    <li class="nav-item mb-4">
                        <a
                            class="nav-link text-uppercase hover-underline"
                            href="contact.html"
                            >Contato</a
                        >
                    </li>
                </ul>
            </div>
        </div>
        <section class="hero-home">
            <div class="container">
                <h1 class="reveal-zoom">Studio Ser</h1>
                <p class="reveal">Estratégia & Design de Identidade</p>
                <div class="reveal" style="transition-delay: 0.3s">
                    <a href="projects.html" class="btn-work">Ver Projetos</a>
                </div>
            </div>
        </section>
        <footer class="site-footer">
            <div class="container-fluid p-5">
                <div class="footer-grid">
                    <div class="footer-col logo-col reveal">
                        <img src="img/logo.png" alt="Studio Ser Design" />
                    </div>
                    <div class="footer-col links-col montserrat-400 reveal">
                        <p>55 54 99699 6091</p>
                        <a href="projects.html" class="hover-underline"
                            >Projetos</a
                        >
                        <a href="#" class="hover-underline">Sobre</a>
                        <a href="contact.html" class="hover-underline"
                            >Contato</a
                        >
                    </div>
                    <div class="footer-col policy-col montserrat-400 reveal">
                        <a href="#" class="hover-underline"
                            >Perguntas frequentes</a
                        >
                        <a href="#" class="hover-underline"
                            >Termos e condições</a
                        >
                        <a href="#" class="hover-underline"
                            >Política de privacidade</a
                        >
                        <a href="#" class="hover-underline"
                            >Política de Cookies</a
                        >
                        <p class="copyright">&copy; Copyright 2026</p>
                    </div>
                    <div class="footer-col social-col montserrat-400 reveal">
                        <a href="#" class="hover-underline">Linkedin</a>
                        <a href="#" class="hover-underline">Instagram</a>
                        <a href="#" class="hover-underline">Behance</a>
                        <a href="#" class="hover-underline">E-mail</a>
                    </div>
                </div>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const reveals = document.querySelectorAll(
                    ".reveal, .reveal-left, .reveal-right, .reveal-zoom",
                );
                const revealOptions = {
                    threshold: 0.1,
                    rootMargin: "0px 0px -50px 0px",
                };
                const revealOnScroll = new IntersectionObserver(function (
                    entries,
                    observer,
                ) {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("active");
                        }
                    });
                }, revealOptions);
                reveals.forEach((reveal) => {
                    revealOnScroll.observe(reveal);
                });
            });
        </script>
    </body>
</html>
